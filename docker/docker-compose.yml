version: "3.8"
services:
  gateway:
    build: { context: .., dockerfile: docker/Dockerfile }
    ports: ["8080:8080"]
    depends_on: [backend1, backend2, backend3]
  backend1:
    build: { dockerfile: docker/Dockerfile.backend }
    ports: ["8001:8000"]
  backend2:
    build: { dockerfile: docker/Dockerfile.backend }
    ports: ["8002:8000"]
  backend3:
    build: { dockerfile: docker/Dockerfile.backend }
    ports: ["8003:8000"]
